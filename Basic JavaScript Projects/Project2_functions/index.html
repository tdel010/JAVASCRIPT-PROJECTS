<!--DOCTYPE = html-->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Function with two variables</title>
    <script src="JS/main.js"></script>
</head>

<body>
    <button onclick="showMessage()">Message Generator</button> <!--Creates a button that will call the "showMessage" function when clicked-->
    <p id="message"></p> <!--Creates a paragraph element with the id "message" where the output of the "showMessage" function will be displayed-->

    <button onclick="myFunction()">Get another message</button> <!--Creates another button that will call the "myFunction" function when clicked-->
    <p id="Concatenate"></p> <!--Creates another paragraph element with the id "Concatenate" where the output of the "myFunction" function will be displayed-->

    <button onclick="getNumber()">Get a random number 1-100</button> <!--Creates a button that will call the "getNumber" function when clicked--> 
    <p id="getNumber"></p>


</body>

</html>
