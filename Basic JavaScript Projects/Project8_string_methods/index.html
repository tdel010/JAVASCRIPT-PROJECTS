<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Methods</title>
</head>

<body>

    <script src="JS/main.js"></script>
    <p id="Concatenate"></p>
    <button onclick="get_Concatenate()">Click to concatenate phrases into a sentence</button>

    <p id="Slice"></p>
    <button onclick="get_Slice()">Click to slice a portion of a string</button>

    <p id="UpperCase"></p>
    <button onclick="get_UpperCase()">Click to convert a string to uppercase</button>

    <p id="Index"></p>
    <button onclick="get_Index()">Click to find the index of a specific character in a string</button>

    <p id="String"></p>
    <button onclick="get_String()">Click to convert a number to a string</button>

    <p id="Precision"></p>
    <button onclick="get_Precision()">Click to format a number to a specified precision</button>

    <p id="Fixed"></p>
    <button onclick="get_Fixed()">Click to format a number with a specific number of decimal places</button>
    
    <p id="Value"></p>
    <button onclick="get_Value()">Click to get the primitive value of a string</button>


</body>

</html>
