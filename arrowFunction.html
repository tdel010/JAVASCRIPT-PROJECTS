<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Function Challenge</title>
</head>
<body>

    <h1>Arrow Function Challenge</h1>
    <h3>Click the button to see the result of the arrow function!</h3>

    <button onclick="displayMessage()">Click Me!</button>

    <script>
        const displayMessage = () => {
            alert("Hello from the arrow function!");
        }
    </script>

</body>
</html>
