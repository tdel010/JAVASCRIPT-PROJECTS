<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow</title>
    <link rel="stylesheet" href="CSS/slideshow.css">
</head>

<body>
    <div id="slideshow" class="slideshow-container">
        <div class="mySlides fade">
            <img src="images/slide1.jpg" alt="Dog image 1">
        </div>
        <div class="mySlides fade portrait-slide">
            <img src="images/slide2.jpg" alt="Dog image 2">
        </div>
        <div class="mySlides fade portrait-slide">
            <img src="images/slide3.jpg" alt="Dog image 3">
        </div>
        <div class="mySlides fade">
            <img src="images/slide4.jpg" alt="Dog image 4">
        </div>
    </div>
    <script src="JavaScript/slideshow.js"></script>
</body>
</html>
