<!DOCTYPE=html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JavaScript Projects</title>
    </head>

    <body>
        <h1 style="font-size:8vw;">Welcome to the bike picker!</h1>
        <h3 style="font-size:6vw;">Which is your favorite type of bike from this list?</h3>
        <canvas id="myCanvas" width="200" height="200" style="border: 2px solid black"> </canvas>
            <ul style="font-size:3vw;">
                <li class="bike-option">Road</li>
                <li class="bike-option">Mountain</li>
                <li class="bike-option">Hybrid</li>
                <li class="bike-option">Electric</li>
                <li class="bike-option">Folding</li>
                <li class="bike-option">Recumbent</li>
                <li class="bike-option">Gravel</li>
                <li class="bike-option">BMX</li>
            </ul>
            <h4>Please type your choice here exactly how it is in the list:</h4>
            <label for="Bike">Bike type</label>
            <input id="Bike" value="" type="text">
            <button onclick="get_Bike()">Submit</button>
            <button onclick="highlight_Bikes()">Highlight all bike options</button>
            <p id="Output"></p>





            <script src="JavaScript/JavaScript_1.js"></script>

    </body>

    </html>
