<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Click Challenge</title>
</head>

<body>
    <p id="turnRed" ondblclick="this.style.color='red'">Double Click Me to Turn Red</p>

    <script>
        function turnRed() {
            document.getElementById("turnRed").style.color = "red";
        }
    </script>
</body>
<html>
